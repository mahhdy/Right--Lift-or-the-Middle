<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 740" width="760" height="740"
     font-family="Vazirmatn, Tahoma, Arial" direction="rtl">
  <defs>
    <linearGradient id="q1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EFF4FF"/>
      <stop offset="100%" stop-color="#D0DCFF"/>
    </linearGradient>
    <linearGradient id="q2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0FFF4"/>
      <stop offset="100%" stop-color="#C8F0D8"/>
    </linearGradient>
    <linearGradient id="q3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF8E8"/>
      <stop offset="100%" stop-color="#F0E0C0"/>
    </linearGradient>
    <linearGradient id="q4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF0F0"/>
      <stop offset="100%" stop-color="#FFD0D0"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="8" markerHeight="6"
            refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#323237"/>
    </marker>
    <filter id="ds" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.30"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="760" height="740" fill="#FAFAF8" rx="16"/>
  <rect x="6" y="6" width="748" height="728" fill="none"
        stroke="#C8B860" stroke-width="1" rx="14" stroke-dasharray="5,4"/>

  <!-- Title -->
  <text x="380" y="34" text-anchor="middle" font-size="18"
        font-weight="bold" fill="#1C1C24">نقشه دوبُعدی ایدئولوژی‌ها</text>
  <text x="380" y="53" text-anchor="middle" font-size="11" fill="#646469">
    محور افقی: اقتصاد (چپ–راست) | محور عمودی: سیاست (اقتدارگرا–آزادی‌خواه)
  </text>

  <!-- Legend Box (top-right corner) -->
  <g id="legend">
    <rect x="620" y="68" width="130" height="138" rx="8"
          fill="white" stroke="#E0E0D8" stroke-width="1.5" opacity="0.95"/>
    <text x="685" y="88" text-anchor="middle" font-size="12"
          font-weight="bold" fill="#323237">راهنما</text>
    
    <!-- Row 1: اقتدارگرا-چپ -->
    <circle cx="635" cy="108" r="7" fill="#8C1414"/>
    <text x="658" y="112" font-size="10.5" font-weight="bold" fill="#8C1414">
      اقتدارگرا–چپ</text>
    
    <!-- Row 2: اقتدارگرا-راست -->
    <circle cx="635" cy="128" r="7" fill="#6B3A00"/>
    <text x="658" y="132" font-size="10.5" font-weight="bold" fill="#6B3A00">
      اقتدارگرا–راست</text>
    
    <!-- Row 3: آزادی‌خواه-چپ -->
    <circle cx="635" cy="148" r="7" fill="#1E6432"/>
    <text x="658" y="152" font-size="10.5" font-weight="bold" fill="#1E6432">
      آزادی‌خواه–چپ</text>
    
    <!-- Row 4: آزادی‌خواه-راست -->
    <circle cx="635" cy="168" r="7" fill="#1E3C8C"/>
    <text x="658" y="172" font-size="10.5" font-weight="bold" fill="#1E3C8C">
      آزادی‌خواه–راست</text>
    
    <!-- Row 5: میانه -->
    <circle cx="635" cy="188" r="7" fill="#32824A"/>
    <text x="658" y="192" font-size="10.5" font-weight="bold" fill="#32824A">
      میانه</text>
  </g>

  <!-- Quadrant backgrounds -->
  <rect x="90"  y="68"  width="265" height="265" rx="6" fill="url(#q4)" opacity="0.65"/>
  <rect x="355" y="68"  width="265" height="265" rx="6" fill="url(#q3)" opacity="0.65"/>
  <rect x="90"  y="333" width="265" height="265" rx="6" fill="url(#q2)" opacity="0.65"/>
  <rect x="355" y="333" width="265" height="265" rx="6" fill="url(#q1)" opacity="0.65"/>

  <!-- QUADRANT LABELS (larger font, positioned ON the central axis) -->
  <!-- These are positioned at x=355 (the matrix border) with proper anchoring -->

  <!-- Top-left: right-aligned at the border -->
  <text x="345" y="100" text-anchor="end" font-size="14" font-weight="bold" 
        fill="#B41E1E">اقتدارگرا–چپ</text>
  <text x="345" y="115" text-anchor="end" font-size="11" fill="#B41E1E">
    کمونیسم · فاشیسم چپ</text>

  <!-- Top-right: left-aligned at the border -->
  <text x="365" y="100" text-anchor="start" font-size="14" font-weight="bold" 
        fill="#6B4A1E">اقتدارگرا–راست</text>
  <text x="365" y="115" text-anchor="start" font-size="11" fill="#6B4A1E">
    فاشیسم · ناسیونالیسم افراطی</text>

  <!-- Bottom-left: right-aligned at the border -->
  <text x="345" y="365" text-anchor="end" font-size="14" font-weight="bold" 
        fill="#1E6432">آزادی‌خواه–چپ</text>
  <text x="345" y="380" text-anchor="end" font-size="11" fill="#1E6432">
    آنارکو–کمونیسم · سوسیالیسم آزاد</text>

  <!-- Bottom-right: left-aligned at the border -->
  <text x="365" y="365" text-anchor="start" font-size="14" font-weight="bold" 
        fill="#1E3C8C">آزادی‌خواه–راست</text>
  <text x="365" y="380" text-anchor="start" font-size="11" fill="#1E3C8C">
    لیبرتارینیسم · آنارکو–کاپیتالیسم</text>

  <!-- Axes -->
  <line x1="85" y1="333" x2="628" y2="333" stroke="#323237" stroke-width="2"
        marker-end="url(#arrowhead)"/>
  <line x1="90" y1="615" x2="90" y2="65" stroke="#323237" stroke-width="2"
        marker-end="url(#arrowhead)"/>

  <!-- Axis labels -->
  <text x="638" y="337" font-size="12" fill="#1E3C8C" font-weight="bold">راست</text>
  <text x="34"  y="337" font-size="12" fill="#B41E1E" font-weight="bold">چپ</text>
  <text x="90"  y="56"  font-size="12" fill="#323237" font-weight="bold"
        text-anchor="middle">اقتدار</text>
  <text x="90"  y="632" font-size="12" fill="#323237" font-weight="bold"
        text-anchor="middle">آزادی</text>

  <!-- Center tick marks -->
  <line x1="355" y1="328" x2="355" y2="338" stroke="#323237" stroke-width="1.5"/>
  <line x1="85"  y1="200" x2="95"  y2="200" stroke="#323237" stroke-width="1.5"/>
  <line x1="85"  y1="466" x2="95"  y2="466" stroke="#323237" stroke-width="1.5"/>

  <!-- Ideology Dots and External Labels -->
  <!-- استالینیسم -->
  <line x1="175" y1="120" x2="248" y2="108"
        stroke="#8C1414" stroke-width="1" opacity="0.5"/>
  <circle cx="175" cy="120" r="10" fill="#8C1414" filter="url(#ds)"/>
  <rect   x="248" y="96" width="90" height="22" rx="4"
          fill="white" stroke="#8C1414" stroke-width="1.4" opacity="0.96"/>
  <text x="293" y="111" text-anchor="middle" font-size="10"
        font-weight="bold" fill="#8C1414">استالینیسم</text>

  <!-- مائوئیسم -->
  <line x1="130" y1="158" x2="218" y2="148"
        stroke="#B41E1E" stroke-width="1" opacity="0.5"/>
  <circle cx="130" cy="158" r="9"  fill="#B41E1E" filter="url(#ds)"/>
  <rect   x="218" y="137" width="76" height="22" rx="4"
          fill="white" stroke="#B41E1E" stroke-width="1.4" opacity="0.96"/>
  <text x="256" y="152" text-anchor="middle" font-size="10"
        font-weight="bold" fill="#B41E1E">مائوئیسم</text>

  <!-- فاشیسم -->
  <line x1="460" y1="130" x2="400" y2="108"
        stroke="#6B3A00" stroke-width="1" opacity="0.5"/>
  <circle cx="460" cy="130" r="10" fill="#6B3A00" filter="url(#ds)"/>
  <rect   x="316" y="96" width="84" height="22" rx="4"
          fill="white" stroke="#6B3A00" stroke-width="1.4" opacity="0.96"/>
  <text x="358" y="111" text-anchor="middle" font-size="10"
        font-weight="bold" fill="#6B3A00">فاشیسم</text>

  <!-- محافظه‌کار اقتدارگرا -->
  <line x1="510" y1="200" x2="540" y2="182"
        stroke="#7A4A10" stroke-width="1" opacity="0.5"/>
  <circle cx="510" cy="200" r="9"  fill="#7A4A10" filter="url(#ds)"/>
  <rect   x="540" y="170" width="130" height="22" rx="4"
          fill="white" stroke="#7A4A10" stroke-width="1.4" opacity="0.96"/>
  <text x="605" y="185" text-anchor="middle" font-size="10"
        font-weight="bold" fill="#7A4A10">محافظه‌کار اقتدارگرا</text>

  <!-- سوسیالیسم -->
  <line x1="155" y1="375" x2="96"  y2="395"
        stroke="#C83232" stroke-width="1" opacity="0.5"/>
  <circle cx="155" cy="375" r="10" fill="#C83232" filter="url(#ds)"/>
  <rect   x="96" y="383" width="94" height="22" rx="4"
          fill="white" stroke="#C83232" stroke-width="1.4" opacity="0.96"/>
  <text x="143" y="398" text-anchor="middle" font-size="10"
        font-weight="bold" fill="#C83232">سوسیالیسم</text>

  <!-- سوسیال دموکراسی -->
  <line x1="195" y1="428" x2="96"  y2="440"
        stroke="#C83C3C" stroke-width="1" opacity="0.5"/>
  <circle cx="195" cy="428" r="10" fill="#C83C3C" filter="url(#ds)"/>
  <rect   x="96" y="429" width="118" height="22" rx="4"
          fill="white" stroke="#C83C3C" stroke-width="1.4" opacity="0.96"/>
  <text x="155" y="444" text-anchor="middle" font-size="10"
        font-weight="bold" fill="#C83C3C">سوسیال‌دموکراسی</text>

  <!-- سوسیال دموکراسی -->
  <line x1="118" y1="538" x2="96"  y2="560"
        stroke="#1E6432" stroke-width="1" opacity="0.5"/>
  <circle cx="118" cy="538" r="9"  fill="#1E6432" filter="url(#ds)"/>
  <rect   x="96" y="549" width="120" height="22" rx="4"
          fill="white" stroke="#1E6432" stroke-width="1.4" opacity="0.96"/>
  <text x="156" y="564" text-anchor="middle" font-size="10"
        font-weight="bold" fill="#1E6432">آنارکو–کمونیسم</text>

  <!-- سیاست سبز -->
  <line x1="275" y1="455" x2="275" y2="490"
        stroke="#3AAA5E" stroke-width="1" opacity="0.5"/>
  <circle cx="275" cy="455" r="9"  fill="#3AAA5E" filter="url(#ds)"/>
  <rect   x="228" y="490" width="94" height="22" rx="4"
          fill="white" stroke="#3AAA5E" stroke-width="1.4" opacity="0.96"/>
  <text x="275" y="505" text-anchor="middle" font-size="10"
        font-weight="bold" fill="#2A8A48">سیاست سبز</text>

  <!-- لیبرالیسم اجتماعی -->
  <line x1="350" y1="385" x2="410" y2="365"
        stroke="#1E6E3C" stroke-width="1" opacity="0.5"/>
  <circle cx="350" cy="385" r="12" fill="#32824A" filter="url(#ds)"/>
  <rect   x="410" y="353" width="136" height="22" rx="4"
          fill="white" stroke="#32824A" stroke-width="1.5" opacity="0.96"/>
  <text x="478" y="368" text-anchor="middle" font-size="10"
        font-weight="bold" fill="#1E6432">لیبرالیسم اجتماعی</text>

  <!-- لیبرالیسم کلاسیک -->
  <line x1="445" y1="405" x2="506" y2="422"
        stroke="#1E5096" stroke-width="1" opacity="0.5"/>
  <circle cx="445" cy="405" r="10" fill="#1E5096" filter="url(#ds)"/>
  <rect   x="506" y="411" width="120" height="22" rx="4"
          fill="white" stroke="#1E5096" stroke-width="1.4" opacity="0.96"/>
  <text x="566" y="426" text-anchor="middle" font-size="10"
        font-weight="bold" fill="#1E5096">لیبرالیسم کلاسیک</text>

  <!-- محافظه‌کاری -->
  <line x1="505" y1="348" x2="556" y2="330"
        stroke="#3450A0" stroke-width="1" opacity="0.5"/>
  <circle cx="505" cy="348" r="10" fill="#4664B4" filter="url(#ds)"/>
  <rect   x="556" y="318" width="100" height="22" rx="4"
          fill="white" stroke="#4664B4" stroke-width="1.4" opacity="0.96"/>
  <text x="606" y="333" text-anchor="middle" font-size="10"
        font-weight="bold" fill="#2840A0">محافظه‌کاری</text>

  <!-- لیبرتارینیسم -->
  <line x1="525" y1="505" x2="580" y2="488"
        stroke="#1E3C8C" stroke-width="1" opacity="0.5"/>
  <circle cx="525" cy="505" r="10" fill="#1E3C8C" filter="url(#ds)"/>
  <rect   x="580" y="476" width="104" height="22" rx="4"
          fill="white" stroke="#1E3C8C" stroke-width="1.4" opacity="0.96"/>
  <text x="632" y="491" text-anchor="middle" font-size="10"
        font-weight="bold" fill="#1E3C8C">لیبرتارینیسم</text>

  <!-- آنارکو-کاپیتالیسم -->
  <line x1="565" y1="565" x2="600" y2="545"
        stroke="#0A2860" stroke-width="1" opacity="0.5"/>
  <circle cx="565" cy="565" r="9"  fill="#0A2860" filter="url(#ds)"/>
  <rect   x="600" y="533" width="140" height="22" rx="4"
          fill="white" stroke="#0A2860" stroke-width="1.4" opacity="0.96"/>
  <text x="670" y="548" text-anchor="middle" font-size="10"
        font-weight="bold" fill="#0A2860">آنارکو–کاپیتالیسم</text>

  <!-- نقطهٔ آرمانی -->
  <circle cx="355" cy="435" r="20" fill="#FFF9E0" fill-opacity="0.7"
          stroke="#B4960A" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="355" y="439" text-anchor="middle" font-size="14" fill="#B4960A">★</text>
  <line x1="355" y1="455" x2="355" y2="480"
        stroke="#B4960A" stroke-width="1" opacity="0.6"/>
  <rect x="306" y="480" width="98" height="22" rx="4"
        fill="white" stroke="#B4960A" stroke-width="1.4" opacity="0.96"/>
  <text x="355" y="495" text-anchor="middle" font-size="10"
        font-weight="bold" fill="#8C7000">نقطهٔ آرمانی؟</text>

  <!-- Source note -->
  <text x="380" y="722" text-anchor="middle" font-size="9.5" fill="#969696">
    برگرفته از: Political Compass · Nolan Chart (1971) · مدل دوبُعدی هاینلاین–فریدمن
  </text>
</svg>