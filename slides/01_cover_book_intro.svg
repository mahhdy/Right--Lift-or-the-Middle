<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800;900&amp;display=swap');
        
        * {
            font-family: 'Vazirmatn', 'Segoe UI', Tahoma, Arial, sans-serif;
        }
        
        .title {
            font-size: 52px;
            font-weight: 800;
            fill: white;
        }
        
        .subtitle {
            font-size: 32px;
            font-weight: 600;
            fill: white;
        }
        
        .body-text {
            font-size: 28px;
            font-weight: 400;
            fill: #3C3C3C;
        }
        
        .highlight {
            font-weight: 700;
        }
        
        .gold-text {
            fill: #F9A825;
        }
        
        .small-text {
            font-size: 22px;
            fill: #666666;
        }
        
        .card {
            fill: white;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.08));
        }
        
        .stat-number {
            font-size: 72px;
            font-weight: 900;
        }
        
        .quote-text {
            font-size: 34px;
            font-weight: 500;
            font-style: italic;
        }
    </style>
    
    
    <!-- Gradient Background -->
    <defs>
        <linearGradient id="bgGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#1A237E;stop-opacity:1" />
            <stop offset="50%" style="stop-color:#283593;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#6A1B9A;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#C81E1E;stop-opacity:1" />
            <stop offset="50%" style="stop-color:#F9A825;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#3949AB;stop-opacity:1" />
        </linearGradient>
        <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    
    <rect width="1080" height="1350" fill="url(#bgGrad1)"/>
    
    <!-- Decorative Circles -->
    <circle cx="150" cy="200" r="180" fill="#C81E1E" opacity="0.15"/>
    <circle cx="930" cy="200" r="180" fill="#3949AB" opacity="0.15"/>
    <circle cx="540" cy="1200" r="250" fill="#F9A825" opacity="0.1"/>
    
    <!-- Spectrum Line -->
    <rect x="100" y="380" width="880" height="12" rx="6" fill="url(#goldGrad)" filter="url(#glow)"/>
    
    <!-- Position Markers -->
    <circle cx="150" cy="386" r="20" fill="#C81E1E" stroke="white" stroke-width="3"/>
    <circle cx="540" cy="386" r="20" fill="#F9A825" stroke="white" stroke-width="3"/>
    <circle cx="930" cy="386" r="20" fill="#3949AB" stroke="white" stroke-width="3"/>
    
    <!-- Labels -->
    <foreignObject x="60" y="420" width="180" height="60">
        <div xmlns="http://www.w3.org/1999/xhtml" style="direction:rtl; text-align:center; font-family:Vazirmatn; color:white; font-size:24px; font-weight:600;">چپ</div>
    </foreignObject>
    <foreignObject x="450" y="420" width="180" height="60">
        <div xmlns="http://www.w3.org/1999/xhtml" style="direction:rtl; text-align:center; font-family:Vazirmatn; color:#F9A825; font-size:24px; font-weight:700;">میانه؟</div>
    </foreignObject>
    <foreignObject x="840" y="420" width="180" height="60">
        <div xmlns="http://www.w3.org/1999/xhtml" style="direction:rtl; text-align:center; font-family:Vazirmatn; color:white; font-size:24px; font-weight:600;">راست</div>
    </foreignObject>
    
    <!-- Main Title -->
    <foreignObject x="40" y="520" width="1000" height="200">
        <div xmlns="http://www.w3.org/1999/xhtml" style="direction:rtl; text-align:center; font-family:Vazirmatn; color:white; font-size:68px; font-weight:900; line-height:1.3; text-shadow: 0 4px 20px rgba(0,0,0,0.3);">
            راست یا چپ؛<br/>میانه کجاست؟
        </div>
    </foreignObject>
    
    <!-- Subtitle -->
    <foreignObject x="80" y="750" width="920" height="100">
        <div xmlns="http://www.w3.org/1999/xhtml" style="direction:rtl; text-align:center; font-family:Vazirmatn; color:#FFD54F; font-size:28px; font-weight:500;">
            سفری جامع در تاریخ و فلسفه طیف سیاسی
        </div>
    </foreignObject>
    
    <!-- Book Icon -->
    <rect x="440" y="880" width="200" height="260" rx="10" fill="white" opacity="0.95"/>
    <rect x="455" y="895" width="170" height="230" rx="5" fill="#1A237E"/>
    <rect x="465" y="950" width="150" height="8" rx="4" fill="#F9A825"/>
    <rect x="465" y="975" width="120" height="6" rx="3" fill="white" opacity="0.5"/>
    <rect x="465" y="995" width="140" height="6" rx="3" fill="white" opacity="0.5"/>
    <rect x="465" y="1015" width="100" height="6" rx="3" fill="white" opacity="0.5"/>
    
    <!-- Author Info -->
    <foreignObject x="80" y="1180" width="920" height="50">
        <div xmlns="http://www.w3.org/1999/xhtml" style="direction:rtl; text-align:center; font-family:Vazirmatn; color:white; font-size:26px; font-weight:600;">
            مهدی سالم
        </div>
    </foreignObject>
    
    <!-- Call to Action -->
    <rect x="340" y="1250" width="400" height="60" rx="30" fill="#F9A825" filter="url(#glow)"/>
    <foreignObject x="340" y="1250" width="400" height="60">
        <div xmlns="http://www.w3.org/1999/xhtml" style="direction:rtl; text-align:center; font-family:Vazirmatn; color:#1A237E; font-size:24px; font-weight:700; line-height:60px;">
            ← بیشتر بخوانید
        </div>
    </foreignObject>
</svg>