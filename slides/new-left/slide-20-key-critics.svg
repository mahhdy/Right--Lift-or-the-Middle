      <text x="650" y="160" text-anchor="start" class="desc">نقد برخی اشکال کنش رادیکال و دفاع از عقلانیت ارتباطی</text>

      <circle cx="38" cy="222" r="38" fill="#FFFFFF" opacity="0.10"/>
      <text x="650" y="219" text-anchor="start" class="name">اریک هابسبام</text>
      <text x="650" y="252" text-anchor="start" class="desc">نقد فاصله‌گرفتن از سیاست طبقاتی و سازمان کارگری</text>

      <circle cx="38" cy="314" r="38" fill="#FFFFFF" opacity="0.10"/>
      <text x="650" y="311" text-anchor="start" class="name">مارکسیست‌های ارتدوکس</text>
      <text x="650" y="344" text-anchor="start" class="desc">نقد فرهنگ‌گرایی، پراکندگی سازمانی و ضعف اقتصاد سیاسی</text>

      <text x="45" y="510" class="latin">CLASS / ORGANIZATION / ECONOMIC POLITICS</text>
