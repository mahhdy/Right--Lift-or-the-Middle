<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg20" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0A0B"/>
      <stop offset="57%" stop-color="#171719"/>
      <stop offset="100%" stop-color="#320B12"/>
    </linearGradient>
    <style>
      .kicker { font-family:"Segoe UI",Arial,sans-serif; font-size:28px; fill:#F6C15A; letter-spacing:3px; }
      .title { font-family:"Vazirmatn","IRANSans","Segoe UI",Tahoma,sans-serif; font-size:66px; font-weight:900; fill:#FFFFFF; direction:rtl; unicode-bidi:bidi-override; }
      .section { font-family:"Vazirmatn","IRANSans","Segoe UI",Tahoma,sans-serif; font-size:35px; font-weight:900; fill:#FFFFFF; direction:rtl; unicode-bidi:bidi-override; }
      .name { font-family:"Vazirmatn","IRANSans","Segoe UI",Tahoma,sans-serif; font-size:28px; font-weight:850; fill:#FFFFFF; direction:rtl; unicode-bidi:bidi-override; }
      .desc { font-family:"Vazirmatn","IRANSans","Segoe UI",Tahoma,sans-serif; font-size:22px; fill:#CFCFCF; direction:rtl; unicode-bidi:bidi-override; }
      .latin { font-family:"Segoe UI",Arial,sans-serif; font-size:21px; fill:#F6C15A; font-weight:800; letter-spacing:1px; }
    </style>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg20)"/>
  <circle cx="250" cy="815" r="360" fill="#D72638" opacity="0.08"/>
  <circle cx="1650" cy="260" r="310" fill="#D72638" opacity="0.09"/>

  <text x="110" y="92" class="kicker">SLIDE 20 / KEY CRITICS</text>
  <text x="1740" y="155" text-anchor="start" class="title">منتقدان شاخص چپ نو</text>
  <line x1="930" y1="190" x2="1740" y2="190" stroke="#D72638" stroke-width="7" stroke-linecap="round"/>

  <g transform="translate(160,255)">
    <rect x="0" y="0" width="760" height="710" rx="35" fill="#FFFFFF" opacity="0.055" stroke="#FFFFFF" stroke-opacity="0.13"/>
    <rect x="0" y="0" width="760" height="90" rx="35" fill="#D72638" opacity="0.75"/>
    <rect x="0" y="60" width="760" height="30" fill="#D72638" opacity="0.75"/>
    <text x="700" y="58" text-anchor="start" class="section">منتقدان راست، لیبرال و نئومحافظه‌کار</text>

    <g transform="translate(55,135)">
