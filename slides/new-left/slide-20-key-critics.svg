  <g transform="translate(1000,255)">
    <rect x="0" y="0" width="760" height="710" rx="35" fill="#FFFFFF" opacity="0.055" stroke="#FFFFFF" stroke-opacity="0.13"/>
    <rect x="0" y="0" width="760" height="90" rx="35" fill="#D72638" opacity="0.75"/>
    <rect x="0" y="60" width="760" height="30" fill="#D72638" opacity="0.75"/>
    <text x="700" y="58" text-anchor="start" class="section">منتقدان از درون چپ یا سنت مارکسیستی</text>

