      <text x="650" y="311" text-anchor="start" class="name">آلن بلوم</text>
      <text x="650" y="344" text-anchor="start" class="desc">نقد سیاست‌زدگی دانشگاه و نسبی‌گرایی فرهنگی</text>

      <text x="45" y="510" class="latin">ORDER / LIBERAL REASON / CULTURAL CONSERVATISM</text>
