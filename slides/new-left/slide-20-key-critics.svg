      <text x="650" y="35" text-anchor="start" class="name">دنیل بل</text>
      <text x="650" y="68" text-anchor="start" class="desc">بدبینی نسبت به رادیکالیسم فرهنگی و ایدئولوژی‌زدگی</text>

      <circle cx="38" cy="130" r="38" fill="#FFFFFF" opacity="0.10"/>
      <text x="650" y="127" text-anchor="start" class="name">ریمون آرون</text>
      <text x="650" y="160" text-anchor="start" class="desc">نقد شور انقلابی دانشجویان و دفاع از عقلانیت لیبرال</text>

      <circle cx="38" cy="222" r="38" fill="#FFFFFF" opacity="0.10"/>
      <text x="650" y="219" text-anchor="start" class="name">ایروینگ کریستول</text>
      <text x="650" y="252" text-anchor="start" class="desc">نقد نئومحافظه‌کارانه بر پیامدهای فرهنگی چپ نو</text>

