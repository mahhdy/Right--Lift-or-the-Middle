<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg17" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0A0B"/>
      <stop offset="58%" stop-color="#171719"/>
      <stop offset="100%" stop-color="#320B12"/>
    </linearGradient>
    <style>
      .kicker { font-family:"Segoe UI",Arial,sans-serif; font-size:28px; fill:#F6C15A; letter-spacing:3px; }
      .title { font-family:"Vazirmatn","IRANSans","Segoe UI",Tahoma,sans-serif; font-size:64px; font-weight:900; fill:#FFFFFF; direction:rtl; unicode-bidi:bidi-override; }
      .item { font-family:"Vazirmatn","IRANSans","Segoe UI",Tahoma,sans-serif; font-size:30px; font-weight:850; fill:#FFFFFF; direction:rtl; unicode-bidi:bidi-override; }
      .desc { font-family:"Vazirmatn","IRANSans","Segoe UI",Tahoma,sans-serif; font-size:22px; fill:#CCCCCC; direction:rtl; unicode-bidi:bidi-override; }
      .center { font-family:"Vazirmatn","IRANSans","Segoe UI",Tahoma,sans-serif; font-size:44px; font-weight:900; fill:#FFFFFF; direction:rtl; unicode-bidi:bidi-override; }
      .small { font-family:"Vazirmatn","IRANSans","Segoe UI",Tahoma,sans-serif; font-size:25px; fill:#D7D7D7; direction:rtl; unicode-bidi:bidi-override; }
    </style>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg17)"/>
  <circle cx="960" cy="585" r="420" fill="#D72638" opacity="0.055"/>
  <text x="110" y="92" class="kicker">SLIDE 17 / PROUD LEGACIES</text>
  <text x="1740" y="155" text-anchor="start" class="title">جنبش‌هایی که چپ نو به آن‌ها می‌بالد</text>
  <line x1="590" y1="190" x2="1740" y2="190" stroke="#D72638" stroke-width="7" stroke-linecap="round"/>

  <!-- central -->
  <circle cx="960" cy="585" r="160" fill="#D72638" opacity="0.88"/>
  <text x="960" y="565" text-anchor="middle" class="center">میراث‌های</text>
  <text x="960" y="625" text-anchor="middle" class="center">افتخارآمیز</text>

  <!-- spokes -->
  <g stroke="#FFFFFF" stroke-opacity="0.15" stroke-width="4">
    <line x1="960" y1="585" x2="960" y2="300"/>
    <line x1="960" y1="585" x2="1280" y2="355"/>
    <line x1="960" y1="585" x2="1465" y2="590"/>
    <line x1="960" y1="585" x2="1280" y2="815"/>
    <line x1="960" y1="585" x2="960" y2="875"/>
    <line x1="960" y1="585" x2="640" y2="815"/>
    <line x1="960" y1="585" x2="455" y2="590"/>
    <line x1="960" y1="585" x2="640" y2="355"/>
  </g>

  <g>
    <rect x="780" y="255" width="360" height="115" rx="24" fill="#FFFFFF" opacity="0.07" stroke="#FFFFFF" stroke-opacity="0.14"/>
    <text x="1100" y="305" text-anchor="start" class="item">حقوق مدنی آمریکا</text>
    <text x="1100" y="342" text-anchor="start" class="desc">ضدنژادپرستی و دموکراسی مشارکتی</text>
  </g>

  <g>
    <rect x="1165" y="315" width="410" height="115" rx="24" fill="#FFFFFF" opacity="0.07" stroke="#FFFFFF" stroke-opacity="0.14"/>
    <text x="1535" y="365" text-anchor="start" class="item">جنبش ضد جنگ ویتنام</text>
    <text x="1535" y="402" text-anchor="start" class="desc">نقد نظامی‌گری و امپریالیسم</text>
  </g>

  <g>
    <rect x="1280" y="532" width="430" height="115" rx="24" fill="#D72638" opacity="0.20" stroke="#D72638" stroke-opacity="0.45"/>
    <text x="1670" y="582" text-anchor="start" class="item">جنبش دانشجویی</text>
    <text x="1670" y="619" text-anchor="start" class="desc">آزادی بیان، دانشگاه انتقادی، خیابان</text>
  </g>

  <g>
    <rect x="1165" y="755" width="410" height="115" rx="24" fill="#FFFFFF" opacity="0.07" stroke="#FFFFFF" stroke-opacity="0.14"/>
    <text x="1535" y="805" text-anchor="start" class="item">فمینیسم موج دوم</text>
    <text x="1535" y="842" text-anchor="start" class="desc">بدن، خانواده، کار خانگی، جنسیت</text>
  </g>

  <g>
    <rect x="780" y="815" width="360" height="115" rx="24" fill="#FFFFFF" opacity="0.07" stroke="#FFFFFF" stroke-opacity="0.14"/>
    <text x="1100" y="865" text-anchor="start" class="item">محیط زیست</text>
    <text x="1100" y="902" text-anchor="start" class="desc">نقد رشدگرایی و تکنوکراسی</text>
  </g>

  <g>
    <rect x="345" y="755" width="410" height="115" rx="24" fill="#FFFFFF" opacity="0.07" stroke="#FFFFFF" stroke-opacity="0.14"/>
    <text x="715" y="805" text-anchor="start" class="item">ضداستعمار و جهان سوم</text>
    <text x="715" y="842" text-anchor="start" class="desc">رهایی ملی، فانون، مبارزه با امپریالیسم</text>
  </g>

  <g>
    <rect x="210" y="532" width="430" height="115" rx="24" fill="#FFFFFF" opacity="0.07" stroke="#FFFFFF" stroke-opacity="0.14"/>
    <text x="600" y="582" text-anchor="start" class="item">مطالعات فرهنگی</text>
    <text x="600" y="619" text-anchor="start" class="desc">رسانه، ایدئولوژی، سبک زندگی</text>
  </g>

  <g>
    <rect x="345" y="315" width="410" height="115" rx="24" fill="#FFFFFF" opacity="0.07" stroke="#FFFFFF" stroke-opacity="0.14"/>
    <text x="715" y="365" text-anchor="start" class="item">نقد صنعت فرهنگ</text>
    <text x="715" y="402" text-anchor="start" class="desc">تبلیغات، مصرف، کالایی‌شدن معنا</text>
  </g>

  <text x="1740" y="1000" text-anchor="start" class="small">از نگاه هواداران، چپ نو زبان جدیدی برای اعتراض، رهایی و نقد سلطه در زندگی روزمره ساخت.</text>
</svg>
