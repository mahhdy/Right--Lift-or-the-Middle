<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800;900&amp;display=swap');
        
        * {
            font-family: 'Vazirmatn', 'Segoe UI', Tahoma, Arial, sans-serif;
        }
        
        .title {
            font-size: 52px;
            font-weight: 800;
            fill: white;
        }
        
        .subtitle {
            font-size: 32px;
            font-weight: 600;
            fill: white;
        }
        
        .body-text {
            font-size: 28px;
            font-weight: 400;
            fill: #3C3C3C;
        }
        
        .highlight {
            font-weight: 700;
        }
        
        .gold-text {
            fill: #F9A825;
        }
        
        .small-text {
            font-size: 22px;
            fill: #666666;
        }
        
        .card {
            fill: white;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.08));
        }
        
        .stat-number {
            font-size: 72px;
            font-weight: 900;
        }
        
        .quote-text {
            font-size: 34px;
            font-weight: 500;
            font-style: italic;
        }
    </style>
    
    
    <defs>
        <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#0D0D0D;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
        </linearGradient>
    </defs>
    
    <rect width="1080" height="1350" fill="url(#bgGrad2)"/>
    
    <!-- Large Question Mark Background -->
    <text x="540" y="750" text-anchor="middle" font-size="800" font-weight="900" fill="#F9A825" opacity="0.08">؟</text>
    
    <!-- Header Badge -->
    <rect x="340" y="80" width="400" height="50" rx="25" fill="#F9A825" opacity="0.9"/>
    <foreignObject x="340" y="80" width="400" height="50">
        <div xmlns="http://www.w3.org/1999/xhtml" style="direction:rtl; text-align:center; font-family:Vazirmatn; color:#1A237E; font-size:22px; font-weight:700; line-height:50px;">
            🤔 یک لحظه فکر کنید
        </div>
    </foreignObject>
    
    <!-- Main Question -->
    <foreignObject x="60" y="220" width="960" height="300">
        <div xmlns="http://www.w3.org/1999/xhtml" style="direction:rtl; text-align:center; font-family:Vazirmatn; color:white; font-size:44px; font-weight:700; line-height:1.6;">
            آیا می‌دانید مفهوم<br/>
            <span style="color:#F9A825;">«چپ و راست»</span><br/>
            از کجا آمده است؟
        </div>
    </foreignObject>
    
    <!-- Divider -->
    <line x1="300" y1="560" x2="780" y2="560" stroke="#F9A825" stroke-width="2" opacity="0.5"/>
    
    <!-- Fact Box -->
    <rect x="80" y="620" width="920" height="400" rx="20" fill="white" opacity="0.05"/>
    <rect x="80" y="620" width="920" height="400" rx="20" stroke="#F9A825" stroke-width="2" fill="none" opacity="0.3"/>
    
    <foreignObject x="100" y="660" width="880" height="340">
        <div xmlns="http://www.w3.org/1999/xhtml" style="direction:rtl; text-align:center; font-family:Vazirmatn; color:white; font-size:30px; font-weight:400; line-height:1.8;">
            <span style="color:#F9A825; font-size:48px; font-weight:800;">۱۷۸۹</span><br/><br/>
            در مجلس ملی فرانسه،<br/>
            طرفداران <span style="color:#EF5350;">تغییر</span> در سمت چپ<br/>
            و حامیان <span style="color:#3949AB;">سنت</span> در سمت راست نشستند.<br/><br/>
            <span style="font-size:24px; color:#FFD54F;">و اینگونه تاریخ سیاست نوشته شد...</span>
        </div>
    </foreignObject>
    
    <!-- Bottom CTA -->
    <foreignObject x="80" y="1100" width="920" height="80">
        <div xmlns="http://www.w3.org/1999/xhtml" style="direction:rtl; text-align:center; font-family:Vazirmatn; color:#F9A825; font-size:26px; font-weight:600;">
            📖 داستان کامل را در کتاب بخوانید
        </div>
    </foreignObject>
    
    <!-- Swipe Indicator -->
    <foreignObject x="80" y="1250" width="920" height="50">
        <div xmlns="http://www.w3.org/1999/xhtml" style="direction:rtl; text-align:center; font-family:Vazirmatn; color:white; font-size:20px; opacity:0.6;">
            ← برای ادامه بکشید
        </div>
    </foreignObject>
</svg>