<svg width="1080" height="1350" viewBox="0 0 1080 1350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&amp;display=swap');
      .root {
        direction: rtl;
        font-family: 'Vazirmatn', 'Segoe UI', Tahoma, sans-serif;
      }
      .header {
        fill: #1A237E;
      }
      .card {
        fill: #FFFFFF;
        filter: drop-shadow(0px 4px 10px rgba(0,0,0,0.05));
      }
      .title {
        font-size: 48px;
        font-weight: bold;
        fill: #FFFFFF;
      }
      .gold {
        color: #F9A825;
        font-weight: bold;
      }
      .content-text {
        font-size: 32px;
        line-height: 1.6;
        color: #212121;
      }
      .hero-quote {
        font-size: 40px;
        font-weight: bold;
        color: #1A237E;
        text-align: center;
        border-right: 8px solid #F9A825;
        padding-right: 20px;
      }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="1080" height="1350" fill="#ECEFF1" />
  
  <!-- Header bar -->
  <rect class="header" width="1080" height="150" />
  
  <foreignObject x="50" y="40" width="980" height="100">
    <div xmlns="http://www.w3.org/1999/xhtml" class="root">
      <h1 style="margin: 0; color: white; font-size: 48px; text-align: center;">زایش طیف سیاسی</h1>
    </div>
  </foreignObject>
  
  <!-- Main Card -->
  <rect class="card" x="50" y="200" width="980" height="400" rx="20" />
  
  <foreignObject x="80" y="230" width="920" height="340">
    <div xmlns="http://www.w3.org/1999/xhtml" class="root">
      <p class="content-text">
        <span class="gold">یافته کلیدی:</span>
        اصطلاحات «چپ» و «راست» نه از تفاوت‌های فلسفی ازلی، بلکه از یک اتفاق ساده فیزیکی در <span class="gold">مجلس ملی ۱۷۸۹ فرانسه</span> زاده شدند. نمایندگان هوادار پادشاه در سمت راست و مخالفان در سمت چپ نشستند.
      </p>
    </div>
  </foreignObject>
  
  <!-- Hero Quote Card -->
  <rect class="card" x="50" y="650" width="980" height="300" rx="20" />
  
  <foreignObject x="80" y="680" width="920" height="240">
    <div xmlns="http://www.w3.org/1999/xhtml" class="root">
      <div class="hero-quote">
        «جامعه قراردادی است میان مردگان، زندگان و آنان که هنوز زاده نشده‌اند.»
        <br/>
        <span style="font-size: 24px; color: #607D8B;">— ادموند برک</span>
      </div>
    </div>
  </foreignObject>
  
  <!-- Footer Info -->
  <foreignObject x="50" y="1250" width="980" height="50">
    <div xmlns="http://www.w3.org/1999/xhtml" class="root" style="text-align: center; color: #1A237E; font-size: 24px; font-weight: bold;">
      راست یا چپ؛ میانه کجاست؟ | فصل اول
    </div>
  </foreignObject>
  
</svg>
