  <line x1="780" y1="190" x2="1740" y2="190" stroke="#D72638" stroke-width="7" stroke-linecap="round"/>

  <!-- Books grid -->
  <g transform="translate(185,255)">
    <rect x="0" y="0" width="1550" height="690" rx="35" fill="#FFFFFF" opacity="0.045" stroke="#FFFFFF" stroke-opacity="0.12"/>

    <!-- row 1 -->
    <g transform="translate(70,70)">
      <rect x="0" y="0" width="310" height="220" rx="22" fill="#D72638" opacity="0.78"/>
      <rect x="22" y="22" width="266" height="176" rx="12" fill="#000000" opacity="0.22"/>
      <text x="270" y="68" text-anchor="start" class="book">انسان تک‌ساحتی</text>
      <text x="270" y="110" text-anchor="start" class="author">هربرت مارکوزه</text>
      <text x="28" y="185" class="latin">ONE-DIMENSIONAL MAN</text>
