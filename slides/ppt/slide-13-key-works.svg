    <g transform="translate(430,70)">
      <rect x="0" y="0" width="310" height="220" rx="22" fill="#FFFFFF" opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.15"/>
      <rect x="22" y="22" width="266" height="176" rx="12" fill="#D72638" opacity="0.18"/>
      <text x="270" y="68" text-anchor="start" class="book">اروس و تمدن</text>
      <text x="270" y="110" text-anchor="start" class="author">هربرت مارکوزه</text>
      <text x="28" y="185" class="latin">EROS AND CIVILIZATION</text>
    </g>

    <g transform="translate(790,70)">
