      <rect x="22" y="22" width="266" height="176" rx="12" fill="#D72638" opacity="0.18"/>
      <text x="270" y="68" text-anchor="start" class="book">بیانیه پورت هورون</text>
      <text x="270" y="110" text-anchor="start" class="author">SDS</text>
      <text x="28" y="185" class="latin">PORT HURON STATEMENT</text>
