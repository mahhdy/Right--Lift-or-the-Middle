<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg13" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0A0B"/>
      <stop offset="55%" stop-color="#171719"/>
      <stop offset="100%" stop-color="#310B12"/>
    </linearGradient>
    <style>
      .kicker { font-family:"Segoe UI",Arial,sans-serif; font-size:28px; fill:#F6C15A; letter-spacing:3px; }
      .title { font-family:"Vazirmatn","IRANSans","Segoe UI",Tahoma,sans-serif; font-size:66px; font-weight:900; fill:#FFFFFF; direction:rtl; unicode-bidi:bidi-override; }
      .book { font-family:"Vazirmatn","IRANSans","Segoe UI",Tahoma,sans-serif; font-size:27px; font-weight:850; fill:#FFFFFF; direction:rtl; unicode-bidi:bidi-override; }
      .author { font-family:"Vazirmatn","IRANSans","Segoe UI",Tahoma,sans-serif; font-size:22px; fill:#D2D2D2; direction:rtl; unicode-bidi:bidi-override; }
      .latin { font-family:"Segoe UI",Arial,sans-serif; font-size:19px; fill:#F6C15A; font-weight:700; }
      .note { font-family:"Vazirmatn","IRANSans","Segoe UI",Tahoma,sans-serif; font-size:27px; fill:#DADADA; direction:rtl; unicode-bidi:bidi-override; }
    </style>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg13)"/>
  <circle cx="290" cy="250" r="310" fill="#D72638" opacity="0.08"/>
  <circle cx="1600" cy="810" r="360" fill="#D72638" opacity="0.09"/>

  <text x="110" y="92" class="kicker">SLIDE 13 / KEY WORKS</text>
