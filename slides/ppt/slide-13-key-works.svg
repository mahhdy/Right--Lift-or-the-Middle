      <rect x="22" y="22" width="266" height="176" rx="12" fill="#D72638" opacity="0.18"/>
      <text x="270" y="68" text-anchor="start" class="book">نخبگان قدرت</text>
      <text x="270" y="110" text-anchor="start" class="author">سی. رایت میلز</text>
      <text x="28" y="185" class="latin">THE POWER ELITE</text>
