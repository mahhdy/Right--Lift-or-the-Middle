      <rect x="22" y="22" width="266" height="176" rx="12" fill="#D72638" opacity="0.18"/>
      <text x="270" y="68" text-anchor="start" class="book">جامعه نمایش</text>
      <text x="270" y="110" text-anchor="start" class="author">گای دبور</text>
      <text x="28" y="185" class="latin">SOCIETY OF THE SPECTACLE</text>
